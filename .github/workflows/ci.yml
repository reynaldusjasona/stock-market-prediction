name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          pip install flake8
          cd backend
          flake8 . --max-line-length=100 --exclude=__pycache__,.venv,venv

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v