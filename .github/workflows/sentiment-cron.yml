name: Score live news sentiment

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  score-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install ML dependencies
        run: |
          cd backend
          pip install -r requirements-ml.txt

      - name: Run sentiment scoring
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd backend
          python -m app.services.score_live_news_service --query-batch-size 50 --max-articles 200
